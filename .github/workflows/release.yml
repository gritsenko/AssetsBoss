name: Release

# Триггер на изменение версии: следим за Directory.Build.props, где живёт <Version>.
# Пуш в master, затрагивающий этот файл, читает версию и, если тега vX.Y.Z
# ещё нет, собирает артефакты и публикует релиз. Это делает флоу идемпотентным —
# коммиты без бампа версии просто пропускаются.
on:
  push:
    branches: [master]
    paths:
      - 'Directory.Build.props'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      should_release: ${{ steps.gate.outputs.should_release }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read version from csproj
        id: ver
        shell: bash
        run: |
          version=$(sed -n 's:.*<Version>\(.*\)</Version>.*:\1:p' \
            Directory.Build.props | head -n1 | tr -d '[:space:]')
          if [ -z "$version" ]; then echo "::error::<Version> не найдена в Directory.Build.props"; exit 1; fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Version: $version"

      - name: Gate on tag existence
        id: gate
        shell: bash
        run: |
          tag="v${{ steps.ver.outputs.version }}"
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "Тег $tag уже существует — релиз пропускается."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Тег $tag ещё не создан — публикуем релиз."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.check.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Package (win-arm64 + win-x64)
        shell: pwsh
        run: pwsh tools/package.ps1

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: AssetsBoss v${{ env.VERSION }}
          generate_release_notes: true
          files: dist/AssetsBoss-${{ env.VERSION }}-*.zip
