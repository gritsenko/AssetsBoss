<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AssetsBoss</title>
    <style>
      /* Критичный inline-CSS: фон и сплеш рисуются мгновенно, ещё до загрузки
         JS-бандла. Фон приложения живёт в bundled index.css, поэтому без этого
         WebView2 до исполнения бандла красит окно дефолтным белым. */
      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      html {
        background: #f3f1ea;
      }
      html.boot-dark {
        background: #16140f;
      }
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        background: #f3f1ea;
        color: #1d1c18;
        font-family: system-ui, sans-serif;
        transition: opacity 0.25s ease;
      }
      html.boot-dark #boot-splash {
        background: #16140f;
        color: #ede7d9;
      }
      #boot-splash.boot-hide {
        opacity: 0;
        pointer-events: none;
      }
      .boot-spinner {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 3px solid rgba(217, 110, 52, 0.2);
        border-top-color: #d96e34;
        animation: boot-spin 0.8s linear infinite;
      }
      .boot-word {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        opacity: 0.55;
      }
      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .boot-spinner {
          animation-duration: 2.4s;
        }
      }
    </style>
    <script>
      // Тема хранится в localStorage и читается ещё до маунта React —
      // подгоняем фон сплеша, чтобы у пользователей тёмной темы не было
      // вспышки светлого фона на старте.
      try {
        if (localStorage.getItem('assetboss-dark') === '1')
          document.documentElement.classList.add('boot-dark')
      } catch (e) {
        /* приватный режим / нет доступа — остаётся светлая тема по умолчанию */
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div id="boot-splash">
      <div class="boot-spinner"></div>
      <div class="boot-word">AssetsBoss</div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
